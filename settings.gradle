pluginManagement {
    repositories {
        mavenCentral() // Checks the global Java repository package index second
        gradlePluginPortal()
        google()       // Directs Gradle to check Google's distribution server first
    }
    plugins {
        // Maps the Android plugin ID directly to a stable, compatible version number
        id 'com.android.application' version '8.4.0'
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' } // Necessary framework repository for Anikku source elements
        google()
    }
}

rootProject.name = "crunchyRepo"
include ':app'
