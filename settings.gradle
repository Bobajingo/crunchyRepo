pluginManagement {
    repositories {
        mavenCentral() 
        gradlePluginPortal()
        google()      
    }
    plugins {
        id 'com.android.application' version '8.4.0' // Gradle will fail build without version number
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' } // Necessary framework repository for Anikku source elements
        google()
    }
}

rootProject.name = "crunchyRepo"
include ':app'
