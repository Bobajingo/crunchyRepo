pluginManagement {
    repositories {
        google()
        mavenCentral() 
        gradlePluginPortal()
    }
    plugins {
        id 'com.android.application' version '8.7.0' 
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = "crunchyRepo"
include ':app'
